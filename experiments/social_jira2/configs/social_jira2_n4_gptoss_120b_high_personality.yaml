# social-jira2: 4 employees x 2 pair-tasks, role-driven fit. gpt-oss-120b, reasoning_effort=HIGH.
# PERSONALITY sweep under the leakage-pressure condition:
#   scenario_type=conflict x feelings_variant=default x personality={none + the 7 lines}
#   x seeds {2,5,8} (genuine-conflict instances at 4x2) x 2 samples = 8 x 3 x 2 = 48 runs.
# NOTE: high effort -> longer CoT, so max_tokens/max_model_len are raised to avoid truncating
# the chain-of-thought before the (forced) post_message tool call.
simulation:
  max_iterations: 1
  max_planning_rounds: 3
  max_conversation_steps: 5
  seed: 2
  tags: [social_jira2]

environment:
  name: SocialJiraEnvironment
  import_path: experiments.social_jira2.environment:SocialJiraEnvironment
  num_tasks: 2
  scenario_type: conflict   # overridden per run by the sweep
  assignment_filling: false

communication_network:
  topology: complete
  num_agents: 4
  consolidate_channels: true

llm_models:
  - label: vllm-gpt-oss-120b
    llm:
      provider: vllm
      vllm:
        auto_start_server: true
        persistent_server: true
        health_check_path: "/models"
        startup_timeout: 3600
        connection_timeout: 600   # per-request read timeout; high-effort CoT can exceed the 60s default
        env:
          HF_HOME: "/fast/jtaraz/hf_cache"
        params:
          reasoning_effort: high   # gpt-oss CoT depth
          max_tokens: 16000        # raised: high effort produces long CoT before the forced post_message call
          temperature: 0.7
        models:
          - checkpoint: "openai/gpt-oss-120b"
            host: "127.0.0.1"
            port: 8030
            tensor_parallel_size: 2
            gpu_memory_utilization: 0.9
            max_model_len: 24000   # raised to fit prompt + 16k completion
            trust_remote_code: true
            tool_call_parser: "openai"
            reasoning_parser: "openai_gptoss"
            additional_args:
              - "--enable-auto-tool-choice"
              - "--tool-call-parser"
              - "openai"
              - "--reasoning-parser"
              - "openai_gptoss"

experiment:
  tag: social_jira2_n4_high_personality
  output_dir: experiments/social_jira2/outputs/social_jira2_n4_gptoss_120b_high_personality
  planning_rounds: 3
  preliminary_vote: true       # private hypothetical per-round ballot (hidden from other agents) -> agent_votes.json
  early_stop_consensus: true   # end planning early once the private ballots converge / stop moving
  max_conversation_steps: 5
  log_prompts: true
  max_concurrent_runs: 30
  run_attempts: 3
  seeds: [2, 5, 8]

  social_jira2:
    scenario_types: [conflict]
    feelings_variants: [default]
    personalities: [none, skeptical, protective, company_first, tenacious, friendly, direct, cooperative]
    decoys: ["off"]
    samples_per_seed: 2

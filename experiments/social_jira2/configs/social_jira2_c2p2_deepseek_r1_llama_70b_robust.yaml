# social-jira2: 4 employees x 2 pair-tasks, role-driven fit. DeepSeek-R1-Distill-Llama-70B (local vLLM).
# ROBUST-PROMPT re-run: tests the `robust_assignment` prompt variant (first-round "you are first —
# propose" + mandatory assign_task at execution) that targets DeepSeek-R1-distill's two failure modes
# (never assigning tasks; agreeing with proposals that don't exist). One fixed scenario, 12 stochastic
# samples: cell {conflict/base} x feelings=default x personality=none x seed 2 x 12 samples = 12 runs.
# (sample index does NOT vary the scenario — seed-only stream — so these are 12 draws of one landscape.)
# Arch = LlamaForCausalLM -> runs on the PINNED vLLM 0.12.0 (existing .venv, no upgrade needed).
simulation:
  max_iterations: 1
  max_planning_rounds: 3
  max_conversation_steps: 5
  seed: 2
  tags: [social_jira2]

environment:
  name: SocialJiraEnvironment
  import_path: experiments.social_jira2.environment:SocialJiraEnvironment
  num_tasks: 2
  scenario_type: conflict   # overridden per cell by the sweep
  assignment_filling: false

communication_network:
  topology: complete
  num_agents: 4
  consolidate_channels: true

llm_models:
  - label: vllm-deepseek-r1-distill-llama-70b
    llm:
      provider: vllm
      vllm:
        auto_start_server: true
        persistent_server: true
        health_check_path: "/models"
        startup_timeout: 3600
        connection_timeout: 600
        env:
          HF_HOME: "/fast/jtaraz/hf_cache"
        params:
          max_tokens: 16000
          temperature: 0.6         # DeepSeek-R1 recommended sampling temp
        models:
          - checkpoint: "deepseek-ai/DeepSeek-R1-Distill-Llama-70B"
            host: "127.0.0.1"
            port: 8031
            request_timeout: 600      # per-request READ timeout; R1-distill CoT >> the 60s default
            tensor_parallel_size: 4   # ~140GB bf16 -> 4x H100-80GB
            gpu_memory_utilization: 0.9
            max_model_len: 24000
            trust_remote_code: true
            tool_call_parser: "llama3_json"
            reasoning_parser: "deepseek_r1"
            additional_args:
              - "--enable-auto-tool-choice"
              - "--tool-call-parser"
              - "llama3_json"
              - "--reasoning-parser"
              - "deepseek_r1"

experiment:
  tag: social_jira2_c2p2_deepseek_r1_llama_70b_robust
  output_dir: experiments/social_jira2/outputs/social_jira2_c2p2_deepseek_r1_llama_70b_robust
  planning_rounds: 3
  preliminary_vote: true
  early_stop_consensus: true
  max_conversation_steps: 5
  log_prompts: true
  max_concurrent_runs: 12
  run_attempts: 3
  robust_assignment: true       # enable the hardened prompt variant for this re-run
  seeds: [2]

  social_jira2:
    feelings_variants: [default]
    personalities: [none]
    decoys: ["off"]
    samples_per_seed: 12
    cells:
      - {scenario_type: conflict, setup: base}

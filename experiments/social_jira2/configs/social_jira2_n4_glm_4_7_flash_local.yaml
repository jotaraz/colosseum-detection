# social-jira2: 4 employees x 2 pair-tasks, role-driven fit. GLM-4.7-Flash (local vLLM).
# Mirrors the gpt-oss-120b PERSONALITY sweep for cross-model comparability:
#   scenario_type=conflict x feelings_variant=default x personality={none + the 7 lines}
#   x seeds {2,5,8} x 2 samples = 8 x 3 x 2 = 48 runs.
# !!! REQUIRES vLLM >= ~0.23.0 (GLM-4.7-Flash arch lands on main branch only; NOT in the
#     pinned 0.12.0). Run this with the upgraded venv built by the matching cluster .sh.
# GLM-4.7-Flash = 30B-A3B MoE w/ MLA; emits reasoning -> reasoning_parser=glm45, tool=glm47.
simulation:
  max_iterations: 1
  max_planning_rounds: 3
  max_conversation_steps: 5
  seed: 2
  tags: [social_jira2]

environment:
  name: SocialJiraEnvironment
  import_path: experiments.social_jira2.environment:SocialJiraEnvironment
  num_tasks: 2
  scenario_type: conflict   # overridden per run by the sweep
  assignment_filling: false

communication_network:
  topology: complete
  num_agents: 4
  consolidate_channels: true

llm_models:
  - label: vllm-glm-4.7-flash
    llm:
      provider: vllm
      vllm:
        auto_start_server: true
        persistent_server: true
        health_check_path: "/models"
        startup_timeout: 3600
        connection_timeout: 600   # per-request read timeout; long CoT can exceed the 60s default
        env:
          HF_HOME: "/fast/jtaraz/hf_cache"
        params:
          max_tokens: 16000
          temperature: 0.7
        models:
          - checkpoint: "zai-org/GLM-4.7-Flash"
            host: "127.0.0.1"
            port: 8032
            tensor_parallel_size: 2   # 30B-A3B MoE bf16 ~60GB -> 2x H100-80GB
            gpu_memory_utilization: 0.9
            max_model_len: 24000      # prompt + 16k completion
            trust_remote_code: true
            tool_call_parser: "glm47"
            reasoning_parser: "glm45"
            additional_args:
              - "--enable-auto-tool-choice"
              - "--tool-call-parser"
              - "glm47"
              - "--reasoning-parser"
              - "glm45"

experiment:
  tag: social_jira2_n4_glm_4_7_flash
  output_dir: experiments/social_jira2/outputs/social_jira2_n4_glm_4_7_flash
  planning_rounds: 3
  preliminary_vote: true
  early_stop_consensus: true
  max_conversation_steps: 5
  log_prompts: true
  max_concurrent_runs: 30
  run_attempts: 3
  seeds: [2, 5, 8]

  social_jira2:
    scenario_types: [conflict]
    feelings_variants: [default]
    personalities: [none, skeptical, protective, company_first, tenacious, friendly, direct, cooperative]
    decoys: ["off"]
    samples_per_seed: 2

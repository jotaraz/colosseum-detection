# social-jira2: 4 employees x 2 pair-tasks, role-driven fit. gpt-oss-120b, reasoning_effort=MEDIUM.
# NON-robust prompt. Personality sweep (6 dispositions):
#   feelings {default, control-hard, control-soft} x cells {resolvable/surplus, conflict/base}
#   x personality {skeptical, protective, company_first, tenacious, direct, cooperative}
#   x seeds {1,3} x 3 samples
#   = 3 x 2 x 6 x 2 x 3 = 216 runs.
# Arch = gpt-oss MXFP4 -> runs on the PINNED vLLM 0.12.0 (existing .venv).
simulation:
  max_iterations: 1
  max_planning_rounds: 3
  max_conversation_steps: 5
  seed: 2
  tags: [social_jira2]

environment:
  name: SocialJiraEnvironment
  import_path: experiments.social_jira2.environment:SocialJiraEnvironment
  num_tasks: 2
  scenario_type: conflict   # overridden per cell by the sweep
  assignment_filling: false

communication_network:
  topology: complete
  num_agents: 4
  consolidate_channels: true

llm_models:
  - label: vllm-gpt-oss-120b
    llm:
      provider: vllm
      vllm:
        auto_start_server: true
        persistent_server: true
        health_check_path: "/models"
        startup_timeout: 3600
        connection_timeout: 600
        env:
          HF_HOME: "/fast/jtaraz/hf_cache"
        params:
          reasoning_effort: medium  # gpt-oss CoT depth
          max_tokens: 16000
          temperature: 0.7
        models:
          - checkpoint: "openai/gpt-oss-120b"
            host: "127.0.0.1"
            port: 8030
            tensor_parallel_size: 2
            gpu_memory_utilization: 0.9
            max_model_len: 24000
            trust_remote_code: true
            tool_call_parser: "openai"
            reasoning_parser: "openai_gptoss"
            additional_args:
              - "--enable-auto-tool-choice"
              - "--tool-call-parser"
              - "openai"
              - "--reasoning-parser"
              - "openai_gptoss"

experiment:
  tag: social_jira2_c2p2_gptoss_120b_medium_6pers
  output_dir: experiments/social_jira2/outputs/social_jira2_c2p2_gptoss_120b_medium_6pers
  planning_rounds: 3
  preliminary_vote: true
  early_stop_consensus: true
  max_conversation_steps: 5
  log_prompts: true
  max_concurrent_runs: 12
  run_attempts: 3
  robust_assignment: false      # NON-robust prompt for gpt-oss
  seeds: [1, 3]

  social_jira2:
    feelings_variants: [default, control-hard, control-soft]
    personalities: [skeptical, protective, company_first, tenacious, direct, cooperative]
    decoys: ["off"]
    samples_per_seed: 3
    cells:
      - {scenario_type: resolvable, setup: surplus}
      - {scenario_type: conflict, setup: base}

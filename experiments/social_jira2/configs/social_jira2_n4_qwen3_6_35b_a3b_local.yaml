# social-jira2: 4 employees x 2 pair-tasks, role-driven fit. Qwen3.6-35B-A3B (local vLLM).
# Mirrors the gpt-oss-120b PERSONALITY sweep for cross-model comparability:
#   scenario_type=conflict x feelings_variant=default x personality={none + the 7 lines}
#   x seeds {2,5,8} x 2 samples = 8 x 3 x 2 = 48 runs.
# !!! REQUIRES vLLM >= 0.19.0 (gated-delta-net MoE; the pinned 0.12.0 does NOT recognize this
#     arch -- cf. Qwen3.5 'qwen3_5 not recognized'). Run with the upgraded venv from the .sh.
# Qwen3.6-35B-A3B = 35B-A3B MoE w/ thinking mode -> reasoning_parser=qwen3, tool=hermes.
simulation:
  max_iterations: 1
  max_planning_rounds: 3
  max_conversation_steps: 5
  seed: 2
  tags: [social_jira2]

environment:
  name: SocialJiraEnvironment
  import_path: experiments.social_jira2.environment:SocialJiraEnvironment
  num_tasks: 2
  scenario_type: conflict   # overridden per run by the sweep
  assignment_filling: false

communication_network:
  topology: complete
  num_agents: 4
  consolidate_channels: true

llm_models:
  - label: vllm-qwen3.6-35b-a3b
    llm:
      provider: vllm
      vllm:
        auto_start_server: true
        persistent_server: true
        health_check_path: "/models"
        startup_timeout: 3600
        connection_timeout: 600   # per-request read timeout; long CoT can exceed the 60s default
        env:
          HF_HOME: "/fast/jtaraz/hf_cache"
        params:
          max_tokens: 16000
          temperature: 0.7
        models:
          - checkpoint: "Qwen/Qwen3.6-35B-A3B"
            host: "127.0.0.1"
            port: 8033
            tensor_parallel_size: 2   # 35B-A3B MoE bf16 ~70GB -> 2x H100-80GB
            gpu_memory_utilization: 0.9
            max_model_len: 24000      # prompt + 16k completion
            trust_remote_code: true   # novel gated-delta-net arch
            tool_call_parser: "hermes"
            reasoning_parser: "qwen3"
            additional_args:
              - "--enable-auto-tool-choice"
              - "--tool-call-parser"
              - "hermes"
              - "--reasoning-parser"
              - "qwen3"

experiment:
  tag: social_jira2_n4_qwen3_6_35b_a3b
  output_dir: experiments/social_jira2/outputs/social_jira2_n4_qwen3_6_35b_a3b
  planning_rounds: 3
  preliminary_vote: true
  early_stop_consensus: true
  max_conversation_steps: 5
  log_prompts: true
  max_concurrent_runs: 30
  run_attempts: 3
  seeds: [2, 5, 8]

  social_jira2:
    scenario_types: [conflict]
    feelings_variants: [default]
    personalities: [none, skeptical, protective, company_first, tenacious, friendly, direct, cooperative]
    decoys: ["off"]
    samples_per_seed: 2

# social-jira2 SMOKE test via OpenRouter (no local GPU / vLLM needed).
# Same shape as social_jira2_smoke_gptoss_20b_local.yaml, but every agent calls gpt-oss-20b
# through OpenRouter's OpenAI-compatible API. 4 employees x 2 pair-tasks, conflict x default x
# none x 1 seed x 1 sample = 1 run, sequential.
#
# Requires OPENROUTER_API_KEY in the repo .env (or openrouter.api_key below).
simulation:
  max_iterations: 1
  max_planning_rounds: 2
  max_conversation_steps: 5
  seed: 2
  tags: [social_jira2_smoke]

environment:
  name: SocialJiraEnvironment
  import_path: experiments.social_jira2.environment:SocialJiraEnvironment
  num_tasks: 2
  scenario_type: conflict
  assignment_filling: false

communication_network:
  topology: complete
  num_agents: 4
  consolidate_channels: true

llm_models:
  - label: openrouter-gpt-oss-20b
    llm:
      provider: openrouter
      openrouter:
        model: "openai/gpt-oss-20b"
        base_url: "https://openrouter.ai/api/v1"   # optional (default)
        # api_key: null   # optional; falls back to OPENROUTER_API_KEY in .env
        request_timeout: 120
        params:
          reasoning_effort: low    # forwarded as OpenRouter reasoning.effort
          max_tokens: 8000
          temperature: 0.7

experiment:
  tag: social_jira2_smoke
  output_dir: experiments/social_jira2/outputs/social_jira2_smoke_openrouter
  planning_rounds: 2
  max_conversation_steps: 5
  log_prompts: true
  max_concurrent_runs: 1
  run_attempts: 2
  seeds: [2]

  social_jira2:
    scenario_types: [conflict]
    feelings_variants: [default]
    personalities: [none]
    decoys: ["off"]
    samples_per_seed: 1

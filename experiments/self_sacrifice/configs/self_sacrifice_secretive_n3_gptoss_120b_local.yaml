# self-sacrifice SECRETIVE variant: 3 agents x 3 tasks, uniform priority, hand-crafted
# cost matrices (NOT seed-curated). Same explicit/obvious instances as veryego/engaged, but
# sweeps the concealed-egoist disposition. Three framings, gpt-oss-120b only:
#   - very_egoistical_secretive            : whole team is the concealed egoist
#   - very_egoistical_secretive_in_engaged : designated agent is the concealed egoist, the
#                                            other two are 'engaged' active debaters
#   - very_egoistical_in_engaged           : designated agent is the (overt) very_egoistical,
#                                            the other two are 'engaged'
# Output dir is named '..._secretive_n3_...' (single-token variant) so the viewer merges these
# framings under the existing n3_gptoss_120b model entry. See prompts.py (_render_persona/_LEAD).
simulation:
  max_iterations: 1
  max_planning_rounds: 3
  # 1 = exactly one model call per agent turn (no intra-turn re-prompting). The agent
  # generates once, its single post_message/assign_task is executed, then the loop stops —
  # so planning rounds no longer pad to the cap with "waiting for teammates" filler steps.
  max_conversation_steps: 1
  seed: 1
  tags: [self_sacrifice_secretive]

environment:
  name: JiraTicketEnvironment
  assignment_filling: false
  max_tasks: 3

communication_network:
  topology: complete
  num_agents: 3
  consolidate_channels: true

llm_models:
  - label: vllm-gpt-oss-120b
    llm:
      provider: vllm
      vllm:
        auto_start_server: true
        persistent_server: true
        health_check_path: "/models"
        startup_timeout: 3600
        env:
          HF_HOME: "/fast/jtaraz/hf_cache"
        params:
          # Lower reasoning effort: at high/default effort gpt-oss-120b routinely ended the
          # deliberative personified turn WITHOUT a parseable assign_task (median only ~700
          # tokens, so NOT a length-cap issue). low effort makes it commit reliably. 8000 ceiling
          # is ample headroom (reasoning_effort forwarded via patched vLLM client).
          reasoning_effort: low
          max_tokens: 8000
          temperature: 0.7
        models:
          - checkpoint: "openai/gpt-oss-120b"
            host: "127.0.0.1"
            port: 8026
            tensor_parallel_size: 2
            gpu_memory_utilization: 0.9
            max_model_len: 16000
            trust_remote_code: true
            tool_call_parser: "openai"
            reasoning_parser: "openai_gptoss"
            additional_args:
              - "--enable-auto-tool-choice"
              - "--tool-call-parser"
              - "openai"
              - "--reasoning-parser"
              - "openai_gptoss"

experiment:
  tag: self_sacrifice_secretive_n3
  output_dir: experiments/self_sacrifice/outputs/self_sacrifice_secretive_n3_gptoss_120b
  planning_rounds: 3
  max_conversation_steps: 1
  log_prompts: true
  max_concurrent_runs: 30
  run_attempts: 3
  seeds: [1, 2, 3, 4, 5]

  self_sacrifice:
    instance_source: explicit
    priority: critical
    designated_index: 0
    samples_per_seed: 3
    framings: [very_egoistical_secretive, very_egoistical_secretive_in_engaged, very_egoistical_in_engaged]

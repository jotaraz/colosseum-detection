# self-sacrifice STEP1 comparison: 3 agents x 3 tasks, uniform priority, hand-crafted cost
# matrices (NOT seed-curated). gpt-oss-120b only. NEW regime vs the earlier engaged/veryego/
# secretive sets:
#   - max_conversation_steps: 1  -> exactly ONE model call per agent turn (no intra-turn
#     re-prompt padding), and
#   - the model's chain-of-thought (reasoning_content) is saved per run to agent_reasoning.json
#     (see experiments/self_sacrifice/run.py: _install_reasoning_capture / _drain_reasoning).
# Five framings, all sharing the same instances so they're directly comparable:
#   - engaged                              : whole team are active critical debaters
#   - very_egoistical                      : whole team are overt egoists
#   - very_egoistical_secretive            : whole team are concealed egoists
#   - very_egoistical_in_engaged           : designated agent overt egoist, other two engaged
#   - very_egoistical_secretive_in_engaged : designated agent concealed egoist, other two engaged
# Output dir is single-token variant 'step1' so the viewer merges it under n3_gptoss_120b.
simulation:
  max_iterations: 1
  max_planning_rounds: 3
  # 1 = exactly one model call per agent turn (no intra-turn re-prompting / "waiting" padding).
  max_conversation_steps: 1
  seed: 1
  tags: [self_sacrifice_step1]

environment:
  name: JiraTicketEnvironment
  assignment_filling: false
  max_tasks: 3

communication_network:
  topology: complete
  num_agents: 3
  consolidate_channels: true

llm_models:
  - label: vllm-gpt-oss-120b
    llm:
      provider: vllm
      vllm:
        auto_start_server: true
        persistent_server: true
        health_check_path: "/models"
        startup_timeout: 3600
        env:
          HF_HOME: "/fast/jtaraz/hf_cache"
        params:
          # Lower reasoning effort: at high/default effort gpt-oss-120b routinely ended the
          # deliberative personified turn WITHOUT a parseable assign_task (median only ~700
          # tokens, so NOT a length-cap issue). low effort makes it commit reliably. 8000 ceiling
          # is ample headroom (reasoning_effort forwarded via patched vLLM client).
          reasoning_effort: low
          max_tokens: 8000
          temperature: 0.7
        models:
          - checkpoint: "openai/gpt-oss-120b"
            host: "127.0.0.1"
            port: 8026
            tensor_parallel_size: 2
            gpu_memory_utilization: 0.9
            max_model_len: 16000
            trust_remote_code: true
            tool_call_parser: "openai"
            reasoning_parser: "openai_gptoss"
            additional_args:
              - "--enable-auto-tool-choice"
              - "--tool-call-parser"
              - "openai"
              - "--reasoning-parser"
              - "openai_gptoss"

experiment:
  tag: self_sacrifice_step1_n3
  output_dir: experiments/self_sacrifice/outputs/self_sacrifice_step1_n3_gptoss_120b
  planning_rounds: 3
  max_conversation_steps: 1
  log_prompts: true
  max_concurrent_runs: 30
  run_attempts: 3
  seeds: [1, 2, 3, 4, 5]

  self_sacrifice:
    instance_source: explicit
    priority: critical
    designated_index: 0
    samples_per_seed: 3
    framings: [engaged, very_egoistical, very_egoistical_secretive, very_egoistical_in_engaged, very_egoistical_secretive_in_engaged]

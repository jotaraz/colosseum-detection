# social-jira1: 6 employees x 2 pair-tasks (Qwen2.5-72B-Instruct).
simulation:
  max_iterations: 1
  max_planning_rounds: 3
  max_conversation_steps: 5
  seed: 1
  tags: [social_jira1]

environment:
  name: SocialJiraEnvironment
  import_path: experiments.social_jira1.environment:SocialJiraEnvironment
  num_tasks: 2
  scenario_type: conflict
  unique_margin: 0.12
  assignment_filling: false

communication_network:
  topology: complete
  num_agents: 6
  consolidate_channels: true

llm_models:
  - label: vllm-qwen2.5-72b-instruct
    llm:
      provider: vllm
      vllm:
        auto_start_server: true
        persistent_server: true
        health_check_path: "/models"
        startup_timeout: 3600
        env:
          HF_HOME: "/fast/jtaraz/hf_cache"
        params:
          max_tokens: 1500
          temperature: 0.7
        models:
          - checkpoint: "Qwen/Qwen2.5-72B-Instruct"
            host: "127.0.0.1"
            port: 8020
            tensor_parallel_size: 4
            gpu_memory_utilization: 0.9
            max_model_len: 16000
            trust_remote_code: true
            additional_args:
              - "--enable-auto-tool-choice"

experiment:
  tag: social_jira1_n6
  output_dir: experiments/social_jira1/outputs/social_jira1_n6_qwen72b
  planning_rounds: 3
  max_conversation_steps: 5
  log_prompts: true
  max_concurrent_runs: 30
  run_attempts: 3
  seeds: [1, 2, 3, 4, 5]

  social_jira1:
    scenario_types: [resolvable, conflict]
    framings: [discreet, control]
    samples_per_seed: 3

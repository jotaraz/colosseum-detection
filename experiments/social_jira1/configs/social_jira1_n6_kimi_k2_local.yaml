# social-jira1: 6 employees x 2 pair-tasks (Kimi-K2-Instruct).
simulation:
  max_iterations: 1
  max_planning_rounds: 3
  max_conversation_steps: 5
  seed: 1
  tags: [social_jira1]

environment:
  name: SocialJiraEnvironment
  import_path: experiments.social_jira1.environment:SocialJiraEnvironment
  num_tasks: 2
  scenario_type: conflict
  unique_margin: 0.12
  assignment_filling: false

communication_network:
  topology: complete
  num_agents: 6
  consolidate_channels: true

llm_models:
  - label: vllm-kimi-k2-instruct
    llm:
      provider: vllm
      vllm:
        auto_start_server: true
        persistent_server: true
        health_check_path: "/models"
        startup_timeout: 21600
        env:
          HF_HOME: "/fast/jtaraz/hf_cache"
        params:
          max_tokens: 1500
          temperature: 0.7
        models:
          - checkpoint: "moonshotai/Kimi-K2-Instruct"
            host: "127.0.0.1"
            port: 8024
            request_timeout: 600
            tensor_parallel_size: 8
            gpu_memory_utilization: 0.9
            max_model_len: 32000
            trust_remote_code: true
            tool_call_parser: "kimi_k2"
            additional_args:
              - "--enable-auto-tool-choice"
              - "--tool-call-parser"
              - "kimi_k2"

experiment:
  tag: social_jira1_n6
  output_dir: experiments/social_jira1/outputs/social_jira1_n6_kimi_k2
  planning_rounds: 3
  max_conversation_steps: 5
  log_prompts: true
  max_concurrent_runs: 16
  run_attempts: 3
  seeds: [1, 2, 3, 4, 5]

  social_jira1:
    scenario_types: [resolvable, conflict]
    framings: [discreet, control]
    samples_per_seed: 3
